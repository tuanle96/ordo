services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: dev
    container_name: ordo-backend
    ports:
      - "38424:38424"
    volumes:
      # Hot-reload: mount source code into container
      - ./backend/src:/app/backend/src
      - ./shared/src:/app/shared/src
      # Preserve node_modules installed inside container
      - /app/node_modules
      - /app/backend/node_modules
      - /app/shared/node_modules
    env_file:
      - .env
    environment:
      - PORT=38424
      - NODE_ENV=development
    restart: unless-stopped
