services:
  redis:
    image: redis:7-alpine
    container_name: ordo-redis
    ports:
      - "38425:6379"
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: dev
    container_name: ordo-backend
    depends_on:
      - redis
    ports:
      - "38424:38424"
    volumes:
      # Hot-reload: mount source code into container
      - ./backend/src:/app/backend/src
      - ./shared/src:/app/shared/src
      # Preserve node_modules installed inside container
      - /app/node_modules
      - /app/backend/node_modules
      - /app/shared/node_modules
    env_file:
      - .env
    environment:
      - PORT=38424
      - NODE_ENV=development
      - RUNNING_IN_DOCKER=1
      - REDIS_URL=redis://redis:6379
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
